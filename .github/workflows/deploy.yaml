name: DevOps Monitoring CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Compose
        run: sudo docker-compose build

      - name: Verify Dashboard Status
        run: |
          sudo docker-compose up -d
          