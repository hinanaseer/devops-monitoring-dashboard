<!DOCTYPE html>
<html>
<head>
    <title>DevOps Monitoring Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: white; text-align: center; padding: 40px; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 800px; margin: auto; }
        .card { background: #2a2a3c; padding: 20px; border-radius: 12px; border: 1px solid #444; }
        .status-up { color: #00ff00; font-weight: bold; }
        .metric { font-size: 24px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>System Health Dashboard</h1>
    <div class="dashboard">
        <div class="card">
            <h3>Container Status</h3>
            <p class="status-up">RUNNING</p>
        </div>
        <div class="card">
            <h3>System Load</h3>
            <div class="metric">12%</div>
        </div>
        <div class="card">
            <h3>Memory Usage</h3>
            <div class="metric">450MB / 8GB</div>
        </div>
        <div class="card">
            <h3>Deployment Version</h3>
            <div class="metric">v1.0.0</div>
        </div>
    </div>
</body>
</html>
